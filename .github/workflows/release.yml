name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            suffix: .exe
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Release Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag version: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          sed -i.bak -E "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          rm Cargo.toml.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v2-rust"
          shared-key: "${{ matrix.target }}"

      - name: Setup Cross Toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/picdash${{ matrix.suffix }}" "dist/picdash-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: picdash-${{ matrix.target }}
          path: dist/picdash-${{ matrix.target }}${{ matrix.suffix }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
